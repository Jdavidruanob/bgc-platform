[project]
name = "coop-bot"
version = "0.1.0"
description = "Bot de mensajería. Whisper, NLU, máquina de estados del diálogo, generación de PDF. Consume coop-api por HTTP."
requires-python = ">=3.12"
dependencies = [
    "coop-contracts",
    "httpx>=0.27",
    "openai>=1.30",
    "python-telegram-bot[job-queue]>=21",
    "reportlab>=4.2",
]

[tool.uv.sources]
coop-contracts = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/coop_bot"]

[dependency-groups]
dev = [
    "pytest>=9.1.1",
    "pytest-cov>=7.1.0",
    "pytest-asyncio>=0.24",
    "pytest-mock>=3.14",
    "respx>=0.21",
    "pypdf>=4.2",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
