[project]
name = "coop-bot"
version = "0.1.0"
description = "Bot de mensajería. Whisper, NLU, máquina de estados del diálogo, generación de PDF. Consume coop-api por HTTP."
requires-python = ">=3.12"
dependencies = [
    "coop-contracts",
    "httpx>=0.27",
    "openai>=1.30",           # cliente para Whisper
    "python-telegram-bot>=21",
    "reportlab>=4.2",         # generación de PDF
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/coop_bot"]

[tool.uv.sources]
coop-contracts = { workspace = true }
