[project]
name = "coop-api"
version = "0.1.0"
description = "API HTTP (FastAPI). Importa coop-core. Resolución de entidades, autenticación."
requires-python = ">=3.12"
dependencies = [
    "coop-core",
    "coop-contracts",
    "fastapi>=0.111",
    "uvicorn[standard]>=0.29",
    "psycopg[binary]>=3.1",
]

[tool.uv.sources]
coop-core = { workspace = true }
coop-contracts = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/coop_api"]

[tool.uv.sources]
coop-core = { workspace = true }
coop-contracts = { workspace = true }
