[project]
name = "coop-api"
version = "0.1.0"
description = "API HTTP (FastAPI). Importa coop-core. Resolución de entidades, autenticación."
requires-python = ">=3.12"
dependencies = [
    "coop-core",
    "coop-contracts",
    "fastapi>=0.111",
    "uvicorn[standard]>=0.29",
    "psycopg[binary]>=3.1",
    "rapidfuzz>=3.9",
]

[tool.uv.sources]
coop-core = { workspace = true }
coop-contracts = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "httpx>=0.28.1",
    "pytest>=9.1.1",
    "pytest-cov>=7.1.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/coop_api"]
