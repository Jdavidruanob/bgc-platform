[project]
name = "coop-desktop"
version = "0.1.0"
description = "Aplicación de escritorio PySide6. Importa coop-core directamente (sin HTTP)."
requires-python = ">=3.12"
dependencies = [
    "coop-core",
    "PySide6>=6.7",
    "openpyxl>=3.1",
    "psycopg[binary]>=3.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/coop_desktop"]
