[project]
name = "coop-core"
version = "0.1.0"
description = "Servicios y repositorios de la cooperativa. Única implementación de reglas financieras."
requires-python = ">=3.12"
dependencies = [
    "python-dateutil>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/coop_core"]
